<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Camion</title>
    <!-- Balises obligatoires pour la PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="apple-touch-icon" href="logo-ne.webp">

    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: #e0e0e0;
            --border-dark: #000000;
            --gray-light: #f5f5f5;
            --gray-dark: #1a1a1a;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 24px;
            max-width: 650px;
            margin: 0 auto;
            -webkit-font-smoothing: antialiased;
        }

        header {
            margin-bottom: 24px;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-left: 4px;
        }

        #logo {
            width: 64px;
            height: 64px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 8px;
            background-color: var(--gray-light);
            padding: 6px;
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
        }

        nav button {
            flex: 1;
            border: none;
            background: none;
            padding: 12px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        nav button.active {
            background-color: var(--text);
            color: var(--bg);
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .controls {
            margin-bottom: 20px;
        }

        .categories-filter {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 4px 12px 4px;
            margin-bottom: 12px;
            scrollbar-width: none; /* Cache la scrollbar sur Firefox */
        }

        .categories-filter::-webkit-scrollbar {
            display: none; /* Cache la scrollbar sur Chrome/Safari */
        }

        .btn-filter {
            background-color: var(--gray-light);
            border: 1px solid transparent;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: var(--radius-md);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s ease;
        }

        .btn-filter.active {
            background-color: var(--gray-dark);
            color: var(--bg);
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            background-color: var(--gray-light);
            border: 1px solid transparent;
            padding: 14px 18px;
            color: var(--text);
            font-size: 0.95rem;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--border-dark);
            background-color: var(--bg);
        }

        .form-group {
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .form-row input, .form-row select {
            flex: 1;
        }

        .btn-add, .btn-save {
            background-color: var(--gray-dark);
            color: var(--bg);
            border: none;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-add:hover, .btn-save:hover {
            background-color: var(--text);
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px 2px;
            user-select: none;
            flex: 1;
        }

        .checkbox-label input {
            width: 18px;
            height: 18px;
            accent-color: var(--text);
            cursor: pointer;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 14px;
            padding-left: 4px;
        }

        .stock-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stock-item {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg);
            transition: background-color 0.2s ease;
        }

        .stock-item.alert {
            background-color: var(--gray-light);
            border-color: transparent;
        }

        .stock-item.edit-mode-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: stretch;
            background-color: var(--bg);
            border: 1px solid var(--text);
        }

        .item-info h3 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .item-info p {
            font-size: 0.8rem;
            color: #666;
        }

        .category-tag {
            display: inline-block;
            background-color: rgba(0,0,0,0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Couleur quand le stock est PLEIN (Gris/Noir du logo, sobre) */
        .item-qty {
            font-size: 1.05rem;
            font-weight: 600;
            font-family: monospace;
            margin-right: 8px;
            min-width: 45px;
            text-align: right;
            color: var(--text); /* Couleur par défaut (noir) quand le stock est plein */
        }

        /* ÉTAT 1 : Stock à la moitié ou moins (Alerte Orange) */
        .stock-item.alert-orange {
            background-color: #fff9f2; /* Fond orange très clair */
            border-color: #F77F00;     /* Bordure orange sécurité */
        }
        .stock-item.alert-orange .item-qty {
            color: #F77F00;
            font-weight: 700;
        }

        /* ÉTAT 2 : Stock complètement vide (Alerte Rouge Extincteur) */
        .stock-item.alert-red {
            background-color: #fff5f5; /* Fond rouge très clair */
            border-color: #E63946;     /* Bordure rouge extincteur */
        }
        .stock-item.alert-red .item-qty {
            color: #E63946;
            font-weight: 700;
        }

        .btn-qty, .btn-icon {
            background-color: var(--bg);
            border: 1px solid var(--border);
            width: 36px;
            height: 36px;
            font-size: 1.1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .btn-icon {
            font-size: 0.95rem;
            border: none;
            color: #888;
        }

        .btn-qty:hover, .btn-icon:hover {
            border-color: var(--border-dark);
            background-color: var(--gray-light);
            color: var(--text);
        }

        .btn-icon.btn-delete-item:hover {
            color: #cc0000;
            background-color: #ffeeee;
        }

        .empty-message {
            font-style: italic;
            color: #777;
            padding: 20px;
            text-align: center;
            font-size: 0.9rem;
            background-color: var(--gray-light);
            border-radius: var(--radius-md);
        }
    </style>
</head>
<body>

    <header>
       <div class="brand-container">
            <img src="logo-ne.webp" id="logo" alt="Logo">
            <h1>Stock Camion</h1>
        </div>
        
        <nav>
            <button id="btn-main" class="active" onclick="switchView('main')">Principal</button>
            <button id="btn-all" onclick="switchView('all')">Tout le Stock</button>
        </nav>
    </header>

    <div class="controls">
        <input type="text" id="search-bar" placeholder="Rechercher une pièce..." oninput="render()" style="margin-bottom: 10px;">
        
        <!-- Filtres par catégorie complets -->
        <div class="categories-filter" id="categories-tabs">
            <button class="btn-filter active" onclick="filterCategory('TOUT')">Tout</button>
            <button class="btn-filter" onclick="filterCategory('SSI')">SSI</button>
            <button class="btn-filter" onclick="filterCategory('EXTINCTEURS')">Extincteurs</button>
            <button class="btn-filter" onclick="filterCategory('DESENFUMAGE')">Désenfumage</button>
            <button class="btn-filter" onclick="filterCategory('OUTILLAGE')">Outillage</button>
            <button class="btn-filter" onclick="filterCategory('EPI')">EPI</button>
            <button class="btn-filter" onclick="filterCategory('AUTRE')">Autre</button>
        </div>
    </div>

    <div id="view-main" class="view active">
        <h2>Pièces Prioritaires</h2>
        <div id="main-stock-list" class="stock-grid"></div>
    </div>

    <div id="view-all" class="view">
        <h2>Nouvelle Pièce</h2>
        <div class="form-group">
            <input type="text" id="item-name" placeholder="Nom de la pièce (ex: Lunettes, Gants, Détecteur...)">
            <div class="form-row">
                <select id="item-category">
                    <option value="SSI" selected>Catégorie : SSI</option>
                    <option value="EXTINCTEURS">Catégorie : Extincteurs</option>
                    <option value="DESENFUMAGE">Catégorie : Désenfumage</option>
                    <option value="OUTILLAGE">Catégorie : Outillage</option>
                    <option value="EPI">Catégorie : EPI</option>
                    <option value="AUTRE">Catégorie : Autre</option>
                </select>
            </div>
            <div class="form-row">
                <input type="number" id="item-max" placeholder="Limite Max (ex: 5)" min="1">
                <label class="checkbox-label">
                    <input type="checkbox" id="item-is-main" checked> Mettre en Principal
                </label>
            </div>
            <button class="btn-add" onclick="addItem()">Ajouter au catalogue</button>
        </div>

        <h2>Inventaire Complet</h2>
        <div id="all-stock-list" class="stock-grid"></div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('truck_inventory')) || [];
        let editingId = null;
        let currentCategoryFilter = 'TOUT';

        function saveToStorage() {
            localStorage.setItem('truck_inventory', JSON.stringify(inventory));
        }

        function switchView(viewName) {
            editingId = null; 
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

            if (viewName === 'main') {
                document.getElementById('view-main').classList.add('active');
                document.getElementById('btn-main').classList.add('active');
            } else {
                document.getElementById('view-all').classList.add('active');
                document.getElementById('btn-all').classList.add('active');
            }
            render();
        }

        function filterCategory(category) {
            currentCategoryFilter = category;
            
            // Mise à jour visuelle des boutons de filtres
            const buttons = document.querySelectorAll('#categories-tabs .btn-filter');
            buttons.forEach(btn => {
                let targetText = category;
                if (category === 'TOUT') targetText = 'TOUT';
                if (category === 'DESENFUMAGE') targetText = 'DÉSENFUMAGE';

                if (btn.textContent.toUpperCase() === targetText || (category === 'TOUT' && btn.textContent === 'Tout')) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            render();
        }

        function addItem() {
            const nameInput = document.getElementById('item-name');
            const maxInput = document.getElementById('item-max');
            const isMainInput = document.getElementById('item-is-main');
            const categoryInput = document.getElementById('item-category');

            const name = nameInput.value.trim();
            const max = parseInt(maxInput.value, 10);
            const category = categoryInput.value;

            if (!name || isNaN(max) || max <= 0) {
                alert("Veuillez entrer un nom et une limite maximum valide.");
                return;
            }

            const newItem = { 
                id: Date.now(), 
                name: name, 
                current: 0, 
                max: max, 
                isMain: isMainInput.checked,
                category: category || 'AUTRE'
            };
            
            inventory.push(newItem);
            saveToStorage();
            render();

            nameInput.value = '';
            maxInput.value = '';
            categoryInput.value = 'SSI';
        }

        function deleteItem(id) {
            if(confirm("Supprimer définitivement cette pièce du stock ?")) {
                inventory = inventory.filter(item => item.id !== id);
                if (editingId === id) editingId = null;
                saveToStorage();
                render();
            }
        }

        function adjustQty(id, amount) {
            const item = inventory.find(i => i.id === id);
            if (item) {
                const newQty = item.current + amount;
                if (newQty >= 0 && newQty <= item.max) {
                    item.current = newQty;
                    saveToStorage();
                    render();
                }
            }
        }

        function startEdit(id) {
            editingId = id;
            render();
        }

        function saveEdit(id) {
            const item = inventory.find(i => i.id === id);
            if (item) {
                const editName = document.getElementById(`edit-name-${id}`).value.trim();
                const editCurrent = parseInt(document.getElementById(`edit-current-${id}`).value, 10);
                const editMax = parseInt(document.getElementById(`edit-max-${id}`).value, 10);
                const editMain = document.getElementById(`edit-main-${id}`).value === 'true';
                const editCategory = document.getElementById(`edit-category-${id}`).value;

                if (!editName || isNaN(editMax) || editMax <= 0 || isNaN(editCurrent) || editCurrent < 0) {
                    alert("Champs invalides. Vérifiez le nom et les quantités.");
                    return;
                }

                item.name = editName;
                item.max = editMax;
                item.isMain = editMain;
                item.category = editCategory;
                item.current = editCurrent > item.max ? item.max : editCurrent;

                editingId = null;
                saveToStorage();
                render();
            }
        }

        function render() {
            const searchQuery = document.getElementById('search-bar').value.toLowerCase();
            const mainContainer = document.getElementById('main-stock-list');
            const allContainer = document.getElementById('all-stock-list');

            mainContainer.innerHTML = '';
            allContainer.innerHTML = '';

            inventory.forEach(item => {
                // Rétrocompatibilité au cas où
                if (!item.category) item.category = 'AUTRE';

                // 1. Filtrer selon la saisie de la recherche
                if (searchQuery && !item.name.toLowerCase().includes(searchQuery)) return;

                // 2. Filtrer selon la catégorie sélectionnée
                if (currentCategoryFilter !== 'TOUT' && item.category !== currentCategoryFilter) return;

                let itemHtml = '';

                if (editingId === item.id) {
                    itemHtml = `
                        <div class="stock-item edit-mode-item">
                            <input type="text" id="edit-name-${item.id}" value="${item.name}" placeholder="Nom de la pièce">
                            <div class="form-row">
                                <input type="number" id="edit-current-${item.id}" value="${item.current}" placeholder="Qté Actuelle" min="0">
                                <input type="number" id="edit-max-${item.id}" value="${item.max}" placeholder="Max" min="1">
                            </div>
                            <div class="form-row">
                                <select id="edit-category-${item.id}">
                                    <option value="SSI" ${item.category === 'SSI' ? 'selected' : ''}>SSI</option>
                                    <option value="EXTINCTEURS" ${item.category === 'EXTINCTEURS' ? 'selected' : ''}>Extincteurs</option>
                                    <option value="DESENFUMAGE" ${item.category === 'DESENFUMAGE' ? 'selected' : ''}>Désenfumage</option>
                                    <option value="OUTILLAGE" ${item.category === 'OUTILLAGE' ? 'selected' : ''}>Outillage</option>
                                    <option value="EPI" ${item.category === 'EPI' ? 'selected' : ''}>EPI</option>
                                    <option value="AUTRE" ${item.category === 'AUTRE' ? 'selected' : ''}>Autre</option>
                                </select>
                                <select id="edit-main-${item.id}">
                                    <option value="true" ${item.isMain ? 'selected' : ''}>Principal</option>
                                    <option value="false" ${!item.isMain ? 'selected' : ''}>Réserve</option>
                                </select>
                            </div>
                            <div class="form-row">
                                <button class="btn-save" style="flex: 1; padding: 10px;" onclick="saveEdit(${item.id})">Enregistrer</button>
                                <button class="btn-qty" style="width: auto; padding: 0 15px; font-size:0.9rem;" onclick="editingId = null; render();">Annuler</button>
                            </div>
                        </div>
                    `;
                } else {
                    // Calcul dynamique de la classe d'alerte
                    let alertClass = ''; // Par défaut : stock plein
                    
                    if (item.current === 0) {
                        alertClass = 'alert-red'; // Complètement vide
                    } else if (item.current <= (item.max / 2)) {
                        alertClass = 'alert-orange'; // À la moitié ou moins
                    }

                    // Formatage propre des labels pour l'affichage des tags
                    let displayCategory = item.category;
                    if (item.category === 'DESENFUMAGE') displayCategory = 'Désenfumage';
                    if (item.category === 'AUTRE') displayCategory = 'Autre';

                    itemHtml = `
                        <div class="stock-item ${alertClass}">
                            <div class="item-info">
                                <h3>${item.name}<span class="category-tag">${displayCategory}</span></h3>
                                <p>${item.isMain ? 'Stock Principal' : 'Réserve'}</p>
                            </div>
                            <div class="item-actions">
                                <span class="item-qty">${item.current}/${item.max}</span>
                                <button class="btn-qty" onclick="adjustQty(${item.id}, -1)">−</button>
                                <button class="btn-qty" onclick="adjustQty(${item.id}, 1)">+</button>
                                <button class="btn-icon" title="Modifier" onclick="startEdit(${item.id})">✏️</button>
                                <button class="btn-icon btn-delete-item" title="Supprimer" onclick="deleteItem(${item.id})">✕</button>
                            </div>
                        </div>
                    `;
                }

                if (item.isMain) mainContainer.insertAdjacentHTML('beforeend', itemHtml);
                allContainer.insertAdjacentHTML('beforeend', itemHtml);
            });

            if (mainContainer.innerHTML === '') mainContainer.innerHTML = '<div class="empty-message">Aucune pièce prioritaire dans cette catégorie ou recherche.</div>';
            if (allContainer.innerHTML === '') allContainer.innerHTML = '<div class="empty-message">Aucune pièce trouvée.</div>';
        }

        // Rendu initial
        render();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker enregistré !'))
                    .catch(err => console.log('Erreur SW', err));
            });
        }
    </script>
</body>
</html>
